<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #0a0a14;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated grid background */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(123, 97, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(123, 97, 255, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Gradient orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
  }
  .orb-1 {
    width: 600px; height: 600px;
    background: rgba(123, 97, 255, 0.12);
    top: -100px; left: -100px;
  }
  .orb-2 {
    width: 500px; height: 500px;
    background: rgba(0, 210, 255, 0.08);
    bottom: -150px; right: 100px;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: rgba(255, 110, 199, 0.06);
    top: 200px; right: 300px;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 120px;
    padding: 0 140px;
    width: 100%;
  }

  /* Left side — visual */
  .visual {
    flex-shrink: 0;
    width: 460px;
    height: 460px;
    position: relative;
  }

  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d2ff, #7b61ff);
    box-shadow: 0 0 60px rgba(123, 97, 255, 0.4), 0 0 120px rgba(0, 210, 255, 0.2);
  }
  .hub::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #0a0a14;
  }
  .hub-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d2ff, #7b61ff);
    z-index: 1;
  }

  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(123, 97, 255, 0.1);
  }
  .ring-1 { width: 160px; height: 160px; }
  .ring-2 { width: 280px; height: 280px; border-color: rgba(123, 97, 255, 0.06); }
  .ring-3 { width: 400px; height: 400px; border-color: rgba(123, 97, 255, 0.03); }

  .agent {
    position: absolute;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00d2ff, #7b61ff);
    opacity: 0.85;
  }
  .agent::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #0a0a14;
  }

  .agent-1 { top: 30px; left: 50%; transform: translateX(-50%); }
  .agent-2 { top: 130px; right: 30px; background: linear-gradient(135deg, #7b61ff, #ff6ec7); }
  .agent-3 { bottom: 130px; right: 30px; }
  .agent-4 { bottom: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #7b61ff, #ff6ec7); }
  .agent-5 { bottom: 130px; left: 30px; }
  .agent-6 { top: 130px; left: 30px; background: linear-gradient(135deg, #7b61ff, #ff6ec7); }

  .line {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .line line {
    stroke: url(#lineGrad);
    stroke-width: 1.5;
    opacity: 0.25;
  }

  /* Right side — text */
  .text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .eyebrow {
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #00d2ff, #7b61ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .title {
    font-size: 96px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -4px;
    line-height: 0.95;
  }

  .tagline {
    font-size: 36px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.3;
    max-width: 600px;
  }

  .features {
    display: flex;
    gap: 32px;
    margin-top: 16px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    color: rgba(255, 255, 255, 0.35);
    font-weight: 400;
  }

  .feature-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-cyan { background: #00d2ff; }
  .dot-purple { background: #7b61ff; }
  .dot-pink { background: #ff6ec7; }

  .install {
    margin-top: 8px;
    padding: 16px 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.5);
    width: fit-content;
  }
  .install span {
    color: #00d2ff;
  }

  /* Bottom bar */
  .bottom {
    position: absolute;
    bottom: 40px;
    left: 140px;
    right: 140px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .org {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.2);
    font-weight: 400;
    letter-spacing: 1px;
  }
  .badges {
    display: flex;
    gap: 12px;
  }
  .badge {
    padding: 6px 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.3);
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="content">
    <div class="visual">
      <svg class="line" viewBox="0 0 460 460">
        <defs>
          <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00d2ff"/>
            <stop offset="100%" style="stop-color:#7b61ff"/>
          </linearGradient>
        </defs>
        <line x1="230" y1="190" x2="230" y2="70"/>
        <line x1="262" y1="208" x2="390" y2="150"/>
        <line x1="262" y1="252" x2="390" y2="310"/>
        <line x1="230" y1="270" x2="230" y2="390"/>
        <line x1="198" y1="252" x2="70" y2="310"/>
        <line x1="198" y1="208" x2="70" y2="150"/>
      </svg>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="hub"><div class="hub-inner"></div></div>
      <div class="agent agent-1"></div>
      <div class="agent agent-2"></div>
      <div class="agent agent-3"></div>
      <div class="agent agent-4"></div>
      <div class="agent agent-5"></div>
      <div class="agent agent-6"></div>
    </div>

    <div class="text">
      <div class="eyebrow">agentweave / cortex</div>
      <div class="title">Give your<br>AI agents a<br>chief of staff.</div>
      <div class="tagline">Coordinate agent teams through plain markdown files. Open protocol, any runtime.</div>
      <div class="features">
        <div class="feature"><div class="feature-dot dot-cyan"></div>Claude Code plugin</div>
        <div class="feature"><div class="feature-dot dot-purple"></div>Open protocol</div>
        <div class="feature"><div class="feature-dot dot-pink"></div>Any AI runtime</div>
      </div>
      <div class="install">$ claude plugins install <span>cortex@agentweave</span></div>
    </div>
  </div>

  <div class="bottom">
    <div class="org">github.com/agentweave/cortex</div>
    <div class="badges">
      <div class="badge">MIT License</div>
      <div class="badge">v0.2.0</div>
    </div>
  </div>
</body>
</html>
